id = "i18nlens"
name = "I18n Lens"
version = "0.1.8"
schema_version = 1
license = "MIT"
authors = ["Trong Nguyen"]
description = "I18n Lens editor integration for Zed - inline translations, hover info, and diagnostics"
repository = "https://github.com/nguyenphutrong/i18nlens"

[language_servers.i18nlens]
name = "I18n Lens Language Server"
languages = ["TypeScript", "TSX", "JavaScript", "JSX", "HTML", "Angular", "PHP", "Blade", "Vue.js", "Svelte"]

[language_servers.i18nlens.language_ids]
"TypeScript" = "typescript"
"TSX" = "typescriptreact"
"JavaScript" = "javascript"
"JSX" = "javascriptreact"
"HTML" = "html"
"Angular" = "html"
"PHP" = "php"
"Blade" = "blade"
"Vue.js" = "vue"
"Svelte" = "svelte"

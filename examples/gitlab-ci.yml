i18n:
  image: alpine:3.20
  stage: test
  variables:
    I18NLENS_VERSION: v0.1.6
  before_script:
    - apk add --no-cache curl tar
    - curl --fail --location --silent --show-error
      "https://github.com/nguyenphutrong/i18nlens/releases/download/${I18NLENS_VERSION:-${INTL_LENS_VERSION}}/i18nlens-x86_64-unknown-linux-gnu.tar.gz"
      --output i18nlens.tar.gz
    - tar -xzf i18nlens.tar.gz
    - chmod +x i18nlens
  script:
    - ./i18nlens ci --fail-on missing,placeholder --format markdown --output i18n-report.md
  artifacts:
    when: always
    paths:
      - i18n-report.md
